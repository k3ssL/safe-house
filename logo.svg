<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Фоновый градиент -->
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1A1A1A"/>
            <stop offset="100%" stop-color="#0A0A0A"/>
        </linearGradient>

        <!-- Синий градиент -->
        <linearGradient id="letterGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#2563EB"/>
            <stop offset="100%" stop-color="#60A5FA"/>
        </linearGradient>

        <!-- Блик -->
        <linearGradient id="glowGradient" x1="50%" y1="0%" x2="50%" y2="100%">
            <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.35"/>
            <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
        </linearGradient>

        <!-- Тень -->
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#2563EB" flood-opacity="0.35"/>
        </filter>

        <!-- Glow -->
        <filter id="glow">
            <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- Фон -->
    <rect width="100" height="100" rx="24" fill="url(#bgGradient)"/>

    <!-- Декоративные круги -->
    <circle cx="50" cy="50" r="42"
            stroke="url(#letterGradient)"
            stroke-width="1.5"
            stroke-opacity="0.2"
            fill="none"/>

    <circle cx="50" cy="50" r="35"
            stroke="url(#letterGradient)"
            stroke-width="1"
            stroke-opacity="0.15"
            fill="none"/>

    <circle cx="50" cy="50" r="28"
            stroke="url(#letterGradient)"
            stroke-width="0.5"
            stroke-opacity="0.1"
            fill="none"/>

    <!-- Буква Б -->
    <g filter="url(#shadow)">
        <path
                d="
                M34 28
                H66
                V36
                H42
                V46
                H52
                C61 46 66 51 66 59
                C66 67 60 72 50 72
                H34
                V28

                M42 54
                V64
                H50
                C55 64 58 62 58 59
                C58 56 55 54 50 54
                H42
            "
                fill="url(#letterGradient)"
                stroke="#FFFFFF"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
        />
    </g>

    <!-- Верхний блик -->
    <path
            d="
            M34 28
            H66
            V36
            H42
            V46
            H52
            C58 46 62 48 64 52
            L66 40
            C63 31 56 28 48 28
            H34
        "
            fill="url(#glowGradient)"
            opacity="0.45"
    />

    <!-- Декоративные точки -->
    <circle cx="68" cy="28" r="2" fill="#3B82F6" opacity="0.7">
        <animate attributeName="opacity"
                 values="0.6;1;0.6"
                 dur="2s"
                 repeatCount="indefinite"/>
    </circle>

    <circle cx="72" cy="32" r="1.5" fill="#60A5FA" opacity="0.5">
        <animate attributeName="opacity"
                 values="0.5;0.9;0.5"
                 dur="2.5s"
                 repeatCount="indefinite"/>
    </circle>

    <circle cx="24" cy="68" r="2" fill="#2563EB" opacity="0.6">
        <animate attributeName="opacity"
                 values="0.6;1;0.6"
                 dur="2.2s"
                 repeatCount="indefinite"/>
    </circle>
</svg>